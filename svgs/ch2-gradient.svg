<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 白色背景 -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- 坐标轴 -->
  <line x1="50" y1="370" x2="580" y2="370" stroke="black" stroke-width="1"/>
  <line x1="138.33" y1="20" x2="138.33" y2="370" stroke="black" stroke-width="1"/>

  <!-- X轴刻度与数字 -->
  <line x1="50" y1="365" x2="50" y2="375" stroke="black"/>
  <text x="50" y="385" text-anchor="middle" font-size="10">-1</text>
  <line x1="138.33" y1="365" x2="138.33" y2="375" stroke="black"/>
  <text x="138.33" y="385" text-anchor="middle" font-size="10">0</text>
  <line x1="226.67" y1="365" x2="226.67" y2="375" stroke="black"/>
  <text x="226.67" y="385" text-anchor="middle" font-size="10">1</text>
  <line x1="315" y1="365" x2="315" y2="375" stroke="black"/>
  <text x="315" y="385" text-anchor="middle" font-size="10">2</text>
  <line x1="403.33" y1="365" x2="403.33" y2="375" stroke="black"/>
  <text x="403.33" y="385" text-anchor="middle" font-size="10">3</text>
  <line x1="491.67" y1="365" x2="491.67" y2="375" stroke="black"/>
  <text x="491.67" y="385" text-anchor="middle" font-size="10">4</text>
  <line x1="580" y1="365" x2="580" y2="375" stroke="black"/>
  <text x="580" y="385" text-anchor="middle" font-size="10">5</text>

  <!-- Y轴刻度与数字 -->
  <line x1="133.33" y1="370" x2="143.33" y2="370" stroke="black"/>
  <text x="128.33" y="375" text-anchor="end" font-size="10">0</text>
  <line x1="133.33" y1="300" x2="143.33" y2="300" stroke="black"/>
  <text x="128.33" y="305" text-anchor="end" font-size="10">20</text>
  <line x1="133.33" y1="230" x2="143.33" y2="230" stroke="black"/>
  <text x="128.33" y="235" text-anchor="end" font-size="10">40</text>
  <line x1="133.33" y1="160" x2="143.33" y2="160" stroke="black"/>
  <text x="128.33" y="165" text-anchor="end" font-size="10">60</text>
  <line x1="133.33" y1="90" x2="143.33" y2="90" stroke="black"/>
  <text x="128.33" y="95" text-anchor="end" font-size="10">80</text>
  <line x1="133.33" y1="20" x2="143.33" y2="20" stroke="black"/>
  <text x="128.33" y="25" text-anchor="end" font-size="10">100</text>

  <!-- 坐标轴标签 -->
  <text x="570" y="390" font-size="12">x</text>
  <text x="90" y="30" font-size="12">loss</text>

  <!-- 函数曲线 (精确二次贝塞尔) -->
  <path d="M 50,86.5 Q 315,653.5 580,86.5" stroke="blue" fill="none" stroke-width="2"/>

  <!-- 函数表达式 -->
  <text x="400" y="100" font-size="14" fill="blue">loss = (3x - 6)²</text>

  <!-- 从左侧开始的梯度下降路径 (绿色点与横竖折线) -->
  <!-- 点: x=0 (loss=36) -->
  <circle cx="138.33" cy="244" r="4" fill="green"/>
  <!-- 点: x=0.7 (loss=15.21) -->
  <circle cx="200.17" cy="316.765" r="4" fill="green"/>
  <!-- 点: x=1.2 (loss=5.76) -->
  <circle cx="244.33" cy="349.84" r="4" fill="green"/>
  <!-- 点: x=1.7 (loss=0.81) -->
  <circle cx="288.5" cy="367.165" r="4" fill="green"/>
  <!-- 点: x=1.9 (loss=0.09) -->
  <circle cx="306.17" cy="369.685" r="4" fill="green"/>
  <!-- 点: x=2 (loss=0) -->
  <circle cx="315" cy="370" r="4" fill="green"/>

  <!-- 横竖折线 (绿色虚线) -->
  <path d="M 138.33,244 L 200.17,244 L 200.17,316.765" stroke="green" stroke-width="1.8" stroke-dasharray="5,3" fill="none"/>
  <path d="M 200.17,316.765 L 244.33,316.765 L 244.33,349.84" stroke="green" stroke-width="1.8" stroke-dasharray="5,3" fill="none"/>
  <path d="M 244.33,349.84 L 288.5,349.84 L 288.5,367.165" stroke="green" stroke-width="1.8" stroke-dasharray="5,3" fill="none"/>
  <path d="M 288.5,367.165 L 306.17,367.165 L 306.17,369.685" stroke="green" stroke-width="1.8" stroke-dasharray="5,3" fill="none"/>
  <path d="M 306.17,369.685 L 315,369.685 L 315,370" stroke="green" stroke-width="1.8" stroke-dasharray="5,3" fill="none"/>

  <!-- 图例说明 -->
  <text x="400" y="60" font-size="12" fill="green">由西至东的梯度下降</text>
</svg>
