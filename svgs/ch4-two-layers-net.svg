<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" style="background-color: #f8f9fa; font-family: 'Segoe UI', Arial, sans-serif;">
  <defs>
    <linearGradient id="gradInput" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradHidden" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50E3C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3DCAB1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradOutput" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D38A1A;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    <filter id="shadowLight" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- 图例（右上角） -->
  <g transform="translate(800, 20)">
    <rect x="0" y="0" width="140" height="110" rx="6" fill="#ffffff" filter="url(#shadowLight)" stroke="#ecf0f1" stroke-width="1"/>
    <circle cx="20" cy="20" r="10" fill="url(#gradInput)" />
    <text x="35" y="25" font-size="13" fill="#34495e">输入节点</text>
    <circle cx="20" cy="55" r="10" fill="url(#gradHidden)" />
    <text x="35" y="60" font-size="13" fill="#34495e">隐藏层</text>
    <circle cx="20" cy="90" r="10" fill="url(#gradOutput)" />
    <text x="35" y="95" font-size="13" fill="#34495e">输出节点</text>
  </g>

  <!-- 连线 -->
  <g stroke="#2c3e50" stroke-width="2.5">
    <line x1="240" y1="250" x2="440" y2="250" />
    <line x1="560" y1="250" x2="760" y2="250" />
  </g>

  <!-- 输入节点 -->
  <circle cx="200" cy="250" r="40" fill="url(#gradInput)" filter="url(#shadow)" />
  <text x="200" y="255" font-size="20" fill="#ffffff" font-weight="bold" text-anchor="middle">x</text>

  <!-- 隐藏节点 -->
  <circle cx="500" cy="250" r="40" fill="url(#gradHidden)" filter="url(#shadow)" />
  <text x="500" y="255" font-size="20" fill="#2c3e50" font-weight="bold" text-anchor="middle">h</text>

  <!-- 输出节点 -->
  <circle cx="800" cy="250" r="45" fill="url(#gradOutput)" filter="url(#shadow)" />
  <text x="800" y="255" font-size="22" fill="#ffffff" font-weight="bold" text-anchor="middle">y</text>

  <!-- 权重标签 -->
  <text x="340" y="220" font-size="16" fill="#34495e" font-weight="bold">w₁</text>
  <text x="660" y="220" font-size="16" fill="#34495e" font-weight="bold">w₂</text>
</svg>
