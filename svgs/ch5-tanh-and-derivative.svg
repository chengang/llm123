<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" text-rendering="geometricPrecision" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>tanh 及其导数</title>
  <desc>在同一坐标系中绘制 tanh(x) 与其导数 1 - tanh^2(x)，x 范围 -4 到 4。</desc>

  <rect width="480" height="360" fill="#ffffff"/>

  <!-- 网格 -->
  <g stroke="#eef0f3" stroke-width="1" shape-rendering="crispEdges">
    <line x1="50"     y1="20"  x2="50"     y2="320"/>
    <line x1="101.25" y1="20"  x2="101.25" y2="320"/>
    <line x1="152.5"  y1="20"  x2="152.5"  y2="320"/>
    <line x1="203.75" y1="20"  x2="203.75" y2="320"/>
    <line x1="306.25" y1="20"  x2="306.25" y2="320"/>
    <line x1="357.5"  y1="20"  x2="357.5"  y2="320"/>
    <line x1="408.75" y1="20"  x2="408.75" y2="320"/>
    <line x1="460"    y1="20"  x2="460"    y2="320"/>
    <line x1="50" y1="45"    x2="460" y2="45"/>
    <line x1="50" y1="107.5" x2="460" y2="107.5"/>
    <line x1="50" y1="232.5" x2="460" y2="232.5"/>
    <line x1="50" y1="295"   x2="460" y2="295"/>
  </g>

  <!-- 坐标轴 -->
  <g stroke="#374151" stroke-width="1" shape-rendering="crispEdges">
    <line x1="50"  y1="170" x2="460"  y2="170"/>
    <line x1="255" y1="20"  x2="255"  y2="320"/>
  </g>

  <!-- 刻度 -->
  <g fill="#374151" font-size="10" text-anchor="middle">
    <text x="50"     y="334">-4</text>
    <text x="101.25" y="334">-3</text>
    <text x="152.5"  y="334">-2</text>
    <text x="203.75" y="334">-1</text>
    <text x="255"    y="334">0</text>
    <text x="306.25" y="334">1</text>
    <text x="357.5"  y="334">2</text>
    <text x="408.75" y="334">3</text>
    <text x="460"    y="334">4</text>
  </g>
  <g fill="#374151" font-size="10" text-anchor="end" dominant-baseline="middle">
    <text x="44" y="45">1</text>
    <text x="44" y="107.5">0.5</text>
    <text x="44" y="170">0</text>
    <text x="44" y="232.5">-0.5</text>
    <text x="44" y="295">-1</text>
  </g>

  <!-- 轴标签 -->
  <text x="460" y="184" fill="#374151" font-size="11" text-anchor="end">x</text>
  <text x="255" y="14"  fill="#374151" font-size="11" text-anchor="middle">y</text>

  <!-- tanh(x) -->
  <path fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        d="M 50,294.9 L 62.8,294.9 L 75.6,294.8 L 88.4,294.6 L 101.3,294.4 L 114.1,293.9 L 126.9,293.3 L 139.7,292.3 L 152.5,290.5 L 165.3,287.7 L 178.1,283.1 L 190.9,276.0 L 203.8,265.2 L 216.6,249.4 L 229.4,227.8 L 242.2,200.6 L 255,170 L 267.8,139.4 L 280.6,112.2 L 293.4,90.6 L 306.3,74.8 L 319.1,64.0 L 331.9,56.9 L 344.7,52.3 L 357.5,49.5 L 370.3,47.8 L 383.1,46.7 L 395.9,46.1 L 408.8,45.6 L 421.6,45.4 L 434.4,45.2 L 447.2,45.1 L 460,45.1"/>

  <!-- 导数 1 - tanh^2(x) -->
  <path fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5 3"
        d="M 50,169.8 L 62.8,169.7 L 75.6,169.6 L 88.4,169.3 L 101.3,168.8 L 114.1,167.9 L 126.9,166.7 L 139.7,164.7 L 152.5,161.2 L 165.3,155.7 L 178.1,147.4 L 190.9,135.0 L 203.8,117.5 L 216.6,95.4 L 229.4,71.7 L 242.2,52.5 L 255,45 L 267.8,52.5 L 280.6,71.7 L 293.4,95.4 L 306.3,117.5 L 319.1,135.0 L 331.9,147.4 L 344.7,155.7 L 357.5,161.2 L 370.3,164.7 L 383.1,166.7 L 395.9,167.9 L 408.8,168.8 L 421.6,169.3 L 434.4,169.6 L 447.2,169.7 L 460,169.8"/>

  <!-- 图例 -->
  <g font-size="11" fill="#374151">
    <rect x="318" y="200" width="138" height="46" fill="#ffffff" stroke="#e5e7eb" rx="4"/>
    <line x1="328" y1="214" x2="352" y2="214" stroke="#2563eb" stroke-width="2"/>
    <text x="358" y="214" dominant-baseline="middle">tanh(x)</text>
    <line x1="328" y1="234" x2="352" y2="234" stroke="#ea580c" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="358" y="234" dominant-baseline="middle">1 − tanh²(x)</text>
  </g>
</svg>

