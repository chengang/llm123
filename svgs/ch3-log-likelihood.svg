<svg width="800" height="533" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景与样式 -->
  <style>
    .axis { stroke: #aaa; stroke-width: 1; }
    .grid { stroke: #eee; stroke-width: 1; stroke-dasharray: 3 3; }
    .curve-likelihood { stroke: #1f77b4; stroke-width: 2.5; fill: none; }
    .curve-loglikelihood { stroke: #d62728; stroke-width: 2.5; fill: none; }
    .max-line { stroke: #2ca02c; stroke-width: 2; stroke-dasharray: 6 4; }
    .title { font-size: 14px; font-weight: bold; }
    .label { font-size: 12px; }
    .axis-label { font-size: 11px; fill: #333; }
  </style>

  <!-- 定义裁剪区域，防止线条溢出 -->
  <defs>
    <clipPath id="clip-top">
      <rect x="45" y="15" width="510" height="110" />
    </clipPath>
    <clipPath id="clip-bottom">
      <rect x="45" y="135" width="510" height="110" />
    </clipPath>
  </defs>

  <!-- 顶部图：似然函数 L(x) (蓝色) -->
  <g transform="translate(0,0)">
    <!-- 坐标轴和网格 (顶部) -->
    <line x1="50" y1="20" x2="50" y2="130" class="axis" />
    <line x1="50" y1="130" x2="560" y2="130" class="axis" />
    <!-- 水平网格线 (顶部) -->
    <line x1="50" y1="30" x2="560" y2="30" class="grid" />
    <line x1="50" y1="50" x2="560" y2="50" class="grid" />
    <line x1="50" y1="70" x2="560" y2="70" class="grid" />
    <line x1="50" y1="90" x2="560" y2="90" class="grid" />
    <line x1="50" y1="110" x2="560" y2="110" class="grid" />
    
    <!-- 刻度标签 (顶部) -->
    <text x="45" y="135" class="axis-label" text-anchor="end">0</text>
    <text x="45" y="15" class="axis-label" text-anchor="end">1</text>
    <text x="300" y="145" class="axis-label" text-anchor="middle">5</text>
    <text x="550" y="145" class="axis-label" text-anchor="middle">10</text>
    <text x="20" y="75" class="axis-label" text-anchor="middle" transform="rotate(-90,20,75)">L(x)</text>

    <!-- 蓝色曲线：似然函数 (高斯型) -->
    <path d="M 50,120 L 100,120 L 150,118.9 L 200,106.5 L 250,59.4 L 300,20 L 350,59.4 L 400,106.5 L 450,118.9 L 500,120 L 550,120" 
          class="curve-likelihood" clip-path="url(#clip-top)" />
  </g>

  <!-- 底部图：对数似然 log L(x) (红色) -->
  <g transform="translate(0,0)">
    <!-- 坐标轴和网格 (底部) -->
    <line x1="50" y1="140" x2="50" y2="250" class="axis" />
    <line x1="50" y1="250" x2="560" y2="250" class="axis" />
    <!-- 水平网格线 (底部) -->
    <line x1="50" y1="150" x2="560" y2="150" class="grid" />
    <line x1="50" y1="170" x2="560" y2="170" class="grid" />
    <line x1="50" y1="190" x2="560" y2="190" class="grid" />
    <line x1="50" y1="210" x2="560" y2="210" class="grid" />
    <line x1="50" y1="230" x2="560" y2="230" class="grid" />
    
    <!-- 刻度标签 (底部) -->
    <text x="45" y="255" class="axis-label" text-anchor="end">-13</text>
    <text x="45" y="135" class="axis-label" text-anchor="end">0</text>
    <text x="300" y="265" class="axis-label" text-anchor="middle">5</text>
    <text x="550" y="265" class="axis-label" text-anchor="middle">10</text>
    <text x="20" y="195" class="axis-label" text-anchor="middle" transform="rotate(-90,20,195)">log L(x)</text>

    <!-- 红色曲线：对数似然 (二次型) -->
    <path d="M 50,236.2 L 100,201.5 L 150,174.6 L 200,155.4 L 250,143.9 L 300,140 L 350,143.9 L 400,155.4 L 450,174.6 L 500,201.5 L 550,236.2" 
          class="curve-loglikelihood" clip-path="url(#clip-bottom)" />
  </g>

  <!-- 贯穿两图的绿色虚线，标示最大值点 x = 5 -->
  <line x1="300" y1="20" x2="300" y2="250" class="max-line" />

  <!-- 标注文字：最大值不变 -->
  <text x="300" y="15" class="title" text-anchor="middle" fill="#2ca02c">最大值点 x = 5</text>
  <text x="300" y="280" class="title" text-anchor="middle" fill="#2ca02c">取对数后最大值位置不变</text>
  
  <!-- 图例 -->
  <g transform="translate(400,30)">
    <rect x="0" y="0" width="12" height="12" fill="#1f77b4" />
    <text x="18" y="10" class="label">似然 L(x)</text>
    <rect x="0" y="20" width="12" height="12" fill="#d62728" />
    <text x="18" y="30" class="label">对数似然 log L(x)</text>
  </g>

  <!-- 补充说明：单调变换保持argmax -->
  <text x="70" y="320" class="label" fill="#333">由于对数函数单调递增，L(x) 与 log L(x) 的</text>
  <text x="70" y="340" class="label" fill="#333">最大值点完全相同，因此可将连乘转换为连加。</text>
  <text x="70" y="365" class="label" fill="#666">(示例函数: L(x)=exp[-(x-5)²/2], log L(x)=-(x-5)²/2)</text>
</svg>
