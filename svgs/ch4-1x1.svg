<svg width="900" height="650" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1" />
    </filter>
    <style>
      .channel-title { font-size: 14px; font-family: sans-serif; font-weight: bold; fill: #1e293b; text-anchor: middle; }
      .pixel-highlight { fill: #fde047; stroke: #eab308; stroke-width: 2; }
      .pixel-number { font-size: 13px; font-family: sans-serif; fill: #1e293b; text-anchor: middle; }
      .conv-label { font-size: 15px; font-family: sans-serif; font-weight: bold; fill: #ea580c; text-anchor: middle; }
      .output-pixel { fill: #a7f3d0; stroke: #10b981; stroke-width: 2; }
    </style>
  </defs>

  <rect width="900" height="650" fill="#f8fafc" />

  <text x="450" y="35" text-anchor="middle" font-size="20" font-family="sans-serif" font-weight="bold" fill="#0f172a">1×1 卷积核：输入 3 通道 → 输出 1 通道</text>

  <!-- ================= 左侧：三个输入通道竖排 ================= -->
  <!-- 通道 1 -->
  <text x="90" y="120" class="channel-title">输入通道 1</text>
  <g filter="url(#shadow)">
    <rect x="30" y="130" width="120" height="120" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="4" />
    <line x1="70" y1="130" x2="70" y2="250" stroke="#bfdbfe" stroke-width="1" />
    <line x1="110" y1="130" x2="110" y2="250" stroke="#bfdbfe" stroke-width="1" />
    <line x1="30" y1="170" x2="150" y2="170" stroke="#bfdbfe" stroke-width="1" />
    <line x1="30" y1="210" x2="150" y2="210" stroke="#bfdbfe" stroke-width="1" />
    <rect x="30" y="130" width="40" height="40" class="pixel-highlight" />
    <text x="50" y="155" class="pixel-number">p₁</text>
  </g>

  <!-- 通道 2 -->
  <text x="90" y="290" class="channel-title">输入通道 2</text>
  <g filter="url(#shadow)">
    <rect x="30" y="300" width="120" height="120" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="4" />
    <line x1="70" y1="300" x2="70" y2="420" stroke="#bfdbfe" stroke-width="1" />
    <line x1="110" y1="300" x2="110" y2="420" stroke="#bfdbfe" stroke-width="1" />
    <line x1="30" y1="340" x2="150" y2="340" stroke="#bfdbfe" stroke-width="1" />
    <line x1="30" y1="380" x2="150" y2="380" stroke="#bfdbfe" stroke-width="1" />
    <rect x="30" y="300" width="40" height="40" class="pixel-highlight" />
    <text x="50" y="325" class="pixel-number">p₂</text>
  </g>

  <!-- 通道 3 -->
  <text x="90" y="460" class="channel-title">输入通道 3</text>
  <g filter="url(#shadow)">
    <rect x="30" y="470" width="120" height="120" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="4" />
    <line x1="70" y1="470" x2="70" y2="590" stroke="#bfdbfe" stroke-width="1" />
    <line x1="110" y1="470" x2="110" y2="590" stroke="#bfdbfe" stroke-width="1" />
    <line x1="30" y1="510" x2="150" y2="510" stroke="#bfdbfe" stroke-width="1" />
    <line x1="30" y1="550" x2="150" y2="550" stroke="#bfdbfe" stroke-width="1" />
    <rect x="30" y="470" width="40" height="40" class="pixel-highlight" />
    <text x="50" y="495" class="pixel-number">p₃</text>
  </g>

  <!-- ================= 中间：1×1 卷积核 ================= -->
  <text x="450" y="330" class="conv-label">1×1 卷积核</text>
  <g filter="url(#shadow)">
    <rect x="430" y="350" width="40" height="40" fill="#fff7ed" stroke="#f97316" stroke-width="2" rx="2" />
  </g>

  <!-- ================= 右侧：输出特征图 ================= -->
  <text x="770" y="310" class="channel-title">输出特征图</text>
  <text x="770" y="480" text-anchor="middle" font-size="13" font-family="sans-serif" fill="#64748b">单通道</text>
  <g filter="url(#shadow)">
    <rect x="710" y="330" width="120" height="120" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="4" />
    <line x1="750" y1="330" x2="750" y2="450" stroke="#a7f3d0" stroke-width="1" />
    <line x1="790" y1="330" x2="790" y2="450" stroke="#a7f3d0" stroke-width="1" />
    <line x1="710" y1="370" x2="830" y2="370" stroke="#a7f3d0" stroke-width="1" />
    <line x1="710" y1="410" x2="830" y2="410" stroke="#a7f3d0" stroke-width="1" />
    <rect x="710" y="330" width="40" height="40" class="output-pixel" />
    <text x="730" y="355" class="pixel-number">y₁₁</text>
  </g>

  <!-- ================= 箭头连接 ================= -->
  <path d="M 150 190 L 420 370" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 150 360 L 420 370" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 150 530 L 420 370" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 470 370 L 700 375" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
</svg>
