<svg viewBox="0 0 450 350" width="100%" xmlns="http://www.w3.org/2000/svg" style="background-color: white; font-family: sans-serif; max-width: 600px; height: auto; display: block; margin: 0 auto;">
  <!-- 定义箭头 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- 网格线 -->
  <g stroke="#eee" stroke-width="1">
    <!-- x 轴网格 -->
    <line x1="110" y1="60" x2="110" y2="220" />
    <line x1="70"  y1="60" x2="70"  y2="220" />
    <line x1="30"  y1="60" x2="30"  y2="220" />
    <line x1="190" y1="60" x2="190" y2="220" />
    <line x1="230" y1="60" x2="230" y2="220" />
    <line x1="270" y1="60" x2="270" y2="220" />
    <!-- y 轴网格 -->
    <line x1="30" y1="180" x2="270" y2="180" />
    <line x1="30" y1="140" x2="270" y2="140" />
    <line x1="30" y1="100" x2="270" y2="100" />
  </g>

  <!-- 坐标轴 -->
  <line x1="30" y1="220" x2="380" y2="220" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="300" x2="150" y2="50" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 坐标轴刻度文本 -->
  <g font-size="12" fill="#333">
    <text x="153" y="238">O</text>
    
    <!-- X 轴刻度 -->
    <text x="105" y="238" text-anchor="middle">-1</text>
    <text x="65"  y="238" text-anchor="middle">-2</text>
    <text x="25"  y="238" text-anchor="middle">-3</text>
    <text x="190" y="238" text-anchor="middle">1</text>
    <text x="230" y="238" text-anchor="middle">2</text>
    <text x="270" y="238" text-anchor="middle">3</text>
    
    <!-- Y 轴刻度 -->
    <text x="142" y="184" text-anchor="end">1</text>
    <text x="142" y="144" text-anchor="end">2</text>
    <text x="142" y="104" text-anchor="end">3</text>
    
    <!-- 轴标签 -->
    <text x="370" y="212" font-style="italic">x</text>
    <text x="160" y="60" font-style="italic">y</text>
  </g>

  <!-- ReLU 函数: y = max(0, x) -->
  <!-- 原点为 (150, 220), 1单位 = 40像素 -->
  <path d="M 30 220 L 150 220 L 270 100" fill="none" stroke="#007BFF" stroke-width="3" stroke-linejoin="round"/>

  <!-- ReLU 的导数: y = 0 (x<0), 未定义 (x=0), y = 1 (x>0) -->
  <!-- 红色虚线 -->
  <path d="M 30 220 L 145 220 M 155 180 L 270 180" fill="none" stroke="#DC3545" stroke-width="2.5" stroke-dasharray="5,3"/>
  <!-- x=0 处的空心圆表示未定义点 -->
  <circle cx="150" cy="220" r="3.5" fill="white" stroke="#DC3545" stroke-width="1.5"/>
  <circle cx="150" cy="180" r="3.5" fill="white" stroke="#DC3545" stroke-width="1.5"/>

  <!-- 图例 -->
  <g transform="translate(280, 60)">
    <rect x="0" y="0" width="140" height="70" fill="white" stroke="#ccc" stroke-width="1" rx="5" ry="5" opacity="0.9"/>
    
    <!-- ReLU 图例项 -->
    <line x1="15" y1="25" x2="45" y2="25" stroke="#007BFF" stroke-width="3" stroke-linejoin="round"/>
    <text x="55" y="29" font-size="14" fill="#333">ReLU(x)</text>
    
    <!-- ReLU' 图例项 -->
    <line x1="15" y1="50" x2="45" y2="50" stroke="#DC3545" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="55" y="54" font-size="14" fill="#333">ReLU'(x)</text>
  </g>
</svg>




