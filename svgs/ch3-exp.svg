<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="600" height="600">
  <!-- 白色背景 -->
  <rect width="100%" height="100%" fill="white" />

  <!-- 坐标系：原点 (200,380)，比例尺：15像素/单位，x范围[-10,10]，y范围[0,20] -->

  <!-- 浅灰色网格线 (虚线) 垂直线：x = -10, -5, 0, 5, 10；水平线：y = 5,10,15,20 -->
  <g stroke="lightgray" stroke-width="0.5" stroke-dasharray="2 2">
    <line x1="50"  y1="50" x2="50"  y2="380" /> <!-- -10 -->
    <line x1="125" y1="50" x2="125" y2="380" /> <!-- -5 -->
    <line x1="200" y1="50" x2="200" y2="380" /> <!-- 0 -->
    <line x1="275" y1="50" x2="275" y2="380" /> <!-- 5 -->
    <line x1="350" y1="50" x2="350" y2="380" /> <!-- 10 -->
    <line x1="50" y1="305" x2="350" y2="305" /> <!-- y=5 -->
    <line x1="50" y1="230" x2="350" y2="230" /> <!-- y=10 -->
    <line x1="50" y1="155" x2="350" y2="155" /> <!-- y=15 -->
    <line x1="50" y1="80"  x2="350" y2="80" />  <!-- y=20 -->
  </g>

  <!-- 坐标轴 (黑色实线) -->
  <g stroke="black" stroke-width="1.2">
    <line x1="50" y1="380" x2="350" y2="380" /> <!-- x轴 -->
    <line x1="200" y1="50" x2="200" y2="380" /> <!-- y轴 -->
  </g>

  <!-- 刻度线和数字 -->
  <g font-family="Arial, sans-serif" fill="black">
    <!-- x轴刻度短线：-10, -5, 0, 5, 10 -->
    <g stroke="black" stroke-width="1">
      <line x1="50"  y1="377" x2="50"  y2="383" /> <!-- -10 -->
      <line x1="125" y1="377" x2="125" y2="383" /> <!-- -5 -->
      <line x1="200" y1="377" x2="200" y2="383" /> <!-- 0 -->
      <line x1="275" y1="377" x2="275" y2="383" /> <!-- 5 -->
      <line x1="350" y1="377" x2="350" y2="383" /> <!-- 10 -->
    </g>

    <!-- x轴数字标签 -->
    <g font-size="10" text-anchor="middle">
      <text x="50"  y="395">-10</text>
      <text x="125" y="395">-5</text>
      <text x="200" y="395">0</text>
      <text x="275" y="395">5</text>
      <text x="350" y="395">10</text>
    </g>

    <!-- y轴刻度 (原有 5,10,15,20，新增 1) -->
    <g stroke="black" stroke-width="1">
      <line x1="197" y1="305" x2="203" y2="305" /> <!-- y=5 -->
      <line x1="197" y1="230" x2="203" y2="230" /> <!-- y=10 -->
      <line x1="197" y1="155" x2="203" y2="155" /> <!-- y=15 -->
      <line x1="197" y1="80"  x2="203" y2="80"  /> <!-- y=20 -->
      <!-- 新增 y=1 的刻度线 -->
      <line x1="197" y1="365" x2="203" y2="365" />
    </g>
    <g font-size="10" text-anchor="end">
      <text x="180" y="308">5</text>
      <text x="180" y="233">10</text>
      <text x="180" y="158">15</text>
      <text x="180" y="83">20</text>
      <!-- 新增 y=1 的数字 -->
      <text x="180" y="368">1</text>
    </g>
  </g>

  <!-- 曲线1: y = x² (蓝色) 绘制到 y = 20 为止 -->
  <path d="M 132.92 80 Q 200 680 267.08 80" stroke="blue" stroke-width="2.5" fill="none" />

  <!-- 曲线2: y = eˣ (红色) 从 x = -10 到 ln20 -->
  <path d="M 50,380 L 57.5,379.999 L 65,379.998 L 72.5,379.997 L 80,379.995 L 87.5,379.992 L 95,379.986 L 102.5,379.977 L 110,379.963 L 117.5,379.939 L 125,379.899 L 132.5,379.833 L 140,379.725 L 147.5,379.547 L 155,379.253 L 158,379.09 L 161,378.89 L 164,378.64 L 167,378.34 L 170,377.97 L 173,377.52 L 176,376.97 L 179,376.30 L 182,375.48 L 185,374.48 L 188,373.26 L 191,371.77 L 194,369.95 L 197,367.72 L 200,365.00 L 203,361.68 L 206,357.62 L 209,352.67 L 212,346.62 L 215,339.23 L 218,330.20 L 221,319.17 L 224,305.70 L 227,289.26 L 230,269.16 L 233,244.62 L 236,214.65 L 239,178.04 L 242,133.33 L 244.94,80"
        stroke="red" stroke-width="2.5" fill="none" />

  <!-- 图例 -->
  <g font-family="Arial, sans-serif" font-size="12">
    <text x="270" y="60" fill="blue" font-weight="bold">y = x²</text>
    <text x="270" y="80" fill="red" font-weight="bold">y = eˣ</text>
  </g>

  <!-- 坐标轴箭头 -->
  <polygon points="345,375 350,380 345,385" fill="black" /> <!-- x轴箭头 -->
  <polygon points="195,55 200,50 205,55" fill="black" />   <!-- y轴箭头 -->
</svg>
